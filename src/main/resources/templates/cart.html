<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>My cart</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="~{fragments/navigation :: head}"></div>
<div class="cart">
    <div class="window">
        <div class="items">
            <div class="item" style="height: 25px; background-color: #dfdede">
                <p></p>
                <p>Name</p>
                <p>Quantity</p>
                <p>Price</p>
                <p>Combined</p>
            </div>
            <div class="item" th:each="item : ${items}">
                <div style="display: flex; height: 100px">
                    <img class="image" th:src="'data:image/jpeg;base64,' + ${item.image}" alt="miniature"/>
                </div>

                <div style="display: flex; height: 100px; flex-direction: column; justify-content: center">
                    <p class="name" th:text="${item.name}"></p>
                    <p style="font-weight: bold; margin: 4px 0;" th:text="'ID: ' + ${item.id}"></p>
                </div>
                <label>
                    <input type="number" th:value="${item.quantity}" min="1"
                           class="quantityInput" onchange="handleQuantity(this)" th:data-product-id="${item.id}"/>
                </label>

                <p th:text="${item.price}"></p>

                <p class="itemPrice" th:text="'$' + ${item.combinedPrice}"></p>

                <button class="trashButton"
                        th:data-product-id="${item.id}"
                        onclick="removeFromCart(this)">
                    <img class="imageButton" th:src="@{/images/icons/trashcan.png}" alt="remove">
                </button>

            </div>
        </div>
        <div class="actions">
            <h1>Checkout</h1>
            <div style="display: flex; flex-direction: row">
                <p style="margin-right: auto">Products</p>
                <p class="checkout" th:text="'$' + ${checkoutProductPrice}"></p>
            </div>

            <div style="display: flex; flex-direction: row">
                <p style="margin-right: auto">Shipment</p>
                <p class="checkout" th:text="'$' + ${checkoutShippingPrice}"></p>
            </div>

            <div style="display: flex; flex-direction: row; align-items: center;">
                <p style="margin-right: auto">Coupon</p>
                <form method="post" th:action="@{/account/cart/apply-coupon}">
                    <label for="couponInput"></label>
                    <input type="text" class="codes" placeholder="Enter coupon code" id="couponInput" name="code">
                </form>
            </div>
            <div style="display: flex; flex-direction: row; align-items: center; margin-top: 0">
                <p style="margin-right: auto; margin-top: 0">Active coupon</p>
                <p class="checkout" style="margin-top: 0" th:text="${code}"></p>
            </div>

            <div style="display: flex; flex-direction: row; margin-bottom: 3px">
                <p style="margin-right: auto; margin-bottom: 3px">Total</p>
                <p class="checkout" style="margin-bottom: 3px" th:text="'$' + ${checkoutPrice}"></p>
            </div>

            <div style="display: flex; flex-direction: row; margin-bottom: 3px" th:if="${code != null and !code.isEmpty()}">
                <p style="margin-right: auto; margin-bottom: 3px">Discount</p>
                <p class="checkout" style="margin-bottom: 3px" th:text="${discount} + '%'"></p>
            </div>


            <div style="display: flex; flex-direction: row; margin-bottom: 3px" th:if="${code != null and !code.isEmpty()}">
                <p style="margin-right: auto; margin-bottom: 3px">Total</p>
                <p class="checkout" style="margin-bottom: 3px" th:text="'$' + ${actualPrice}"></p>
            </div>


            <form method="get" th:action="@{/account/cart/order}" style="display: flex; justify-content: center" >
                <button type="submit" class="continue">Complete the order</button>
            </form>

        </div>
    </div>
</div>

<div id="notifErrorData" class="cartNotification" th:if="${param.error != null and param.error[0] == 'data'}" style="background-color: #c0392b;">
    <span>Please fill in all required address and account details before ordering.</span>
    <div class="cartNotificationButtons">
        <a th:href="@{/account/data}" class="cartNotificationBtn cartNotificationBtnCart">Go to Account data</a>
        <button class="cartNotificationBtn cartNotificationBtnContinue" onclick="closeNotification('notifErrorData')">Dismiss</button>
    </div>
</div>

<div id="notifErrorEmpty" class="cartNotification" th:if="${param.error != null and param.error[0] == 'empty'}" style="background-color: #c0392b;">
    <span>Your cart is empty.</span>
    <div class="cartNotificationButtons">
        <a th:href="@{/store}" class="cartNotificationBtn cartNotificationBtnCart">Go to Store</a>
        <button class="cartNotificationBtn cartNotificationBtnContinue" onclick="closeNotification('notifErrorEmpty')">Dismiss</button>
    </div>
</div>

<div id="notifSuccess" class="cartNotification" th:if="${param.successful != null and param.successful[0] == 'order'}" style="background-color: #27ae60;">
    <span>Order placed successfully!</span>
    <div class="cartNotificationButtons">
        <a th:href="@{/store}" class="cartNotificationBtn cartNotificationBtnCart">Back to Store</a>
        <button class="cartNotificationBtn cartNotificationBtnContinue" onclick="closeNotification('notifSuccess')">Dismiss</button>
    </div>
</div>

<div id="toast" style="display:none; position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
     padding:12px 24px; border-radius:8px; color:white; font-weight:bold; z-index:9999; font-size:15px;"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'notfound') showToast('Coupon does not exist.', '#e74c3c');
    else if (params.get('error') === 'expired') showToast('Coupon is expired or has no usages left.', '#e67e22');
    else if (params.get('successful') === 'added') showToast('Coupon applied successfully!', '#27ae60');

    function closeNotification(id) {
        document.getElementById(id).style.display = 'none';
    }

    setTimeout(() => ['notifErrorData', 'notifErrorEmpty', 'notifSuccess'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
    }), 5000);

    function showToast(message, color) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.style.backgroundColor = color;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    let refreshTimer;
    const csrfToken = document.querySelector('input[name="_csrf"]')?.value;

    function handleQuantity(input) {
        let value = parseInt(input.value);
        if (isNaN(value) || value < 1) value = 1;
        input.value = value;

        const productId = input.dataset.productId;

        fetch(`/account/update-quantity?id=${productId}&quantity=${value}`, {
            method: 'POST',
            headers: {
                'X-CSRF-TOKEN': csrfToken
            }
        }).then(response => {
            if (response.ok) {
                clearTimeout(refreshTimer);
                refreshTimer = setTimeout(() => {
                    location.reload();
                }, 1000);
            }
        }).catch(error => console.error("Error:", error));
    }


    function removeFromCart(button) {
        const productId = button.dataset.productId;
        const item = button.closest('.item');

        if (confirm("Are you sure you want to remove this item from the cart?")) {

            fetch(`/account/remove-product?id=${productId}`, {
                method: 'POST',
                headers: {
                    'X-CSRF-TOKEN': csrfToken
                }
            }).then(() => {
                item.remove();
                location.reload();
            }).catch(error => console.error("Error:", error));
        }
    }


</script>
</body>
</html>
