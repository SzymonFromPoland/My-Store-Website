<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
  <div th:replace="~{fragments/navigation :: head}"></div>
  <div class="loginPage">

    <div class="loginBox">
      <h2>Sign Up</h2>
      <div th:if="${param.error}" class="registerFailed">
        Failed to register. Please try again.
      </div>
      <div th:if="${param.successful}" class="registerSuccessful">
        Registration succeeded. Log in <a th:href="@{/login}">here</a>
      </div>
      <form method="post" th:action="@{/register}" class="registerInput">
        <label for="username"></label><input class="emailInput" type="text" name="username" id="username" placeholder="Username" required>
        <label for="password"></label><input class="passwordInput" type="password" name="password" id="password"  placeholder="Password" required>
        <button type="submit" class="registerButton">Sing up</button>
      </form>

      <div class="row">
        <span style="font-weight: normal; margin-right: 6px">Have an account?</span>
        <a th:href="@{/login}">Sign in</a>
      </div>
    </div>
  </div>
</body>
</html>
